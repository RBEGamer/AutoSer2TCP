<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ser2tcp tunnel terminal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #ccc; font-family: sans-serif;
  display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

.toolbar { display: flex; align-items: center; gap: 0.8em;
  padding: 0.4em 0.8em; background: #2d2d2d; border-bottom: 1px solid #444;
  flex-shrink: 0; flex-wrap: wrap; }
.toolbar a { color: #4a9eff; text-decoration: none; font-size: 0.85em; }
.toolbar a:hover { text-decoration: underline; }
.toolbar button { padding: 0.3em 0.8em; border: 1px solid #555;
  border-radius: 4px; cursor: pointer; font-size: 0.85em;
  background: #383838; color: #ccc; }
.toolbar button:hover { background: #444; }
.toolbar button:disabled { opacity: 0.55; cursor: not-allowed; }
.toolbar select { padding: 0.3em 0.6em; background: #383838; color: #ccc;
  border: 1px solid #555; border-radius: 4px; font-size: 0.85em; max-width: 22em; }
.toolbar select:disabled { opacity: 0.55; }
.btn-connect { background: #4c4 !important; color: #fff !important; border-color: #4c4 !important; }
.btn-connect:hover { background: #3b3 !important; }
.btn-disconnect { background: #e55 !important; color: #fff !important; border-color: #e55 !important; }
.btn-disconnect:hover { background: #d44 !important; }
.spacer { flex: 1; }
.status { font-size: 0.85em; white-space: nowrap; }
.dot { font-size: 1.2em; vertical-align: middle; }
.dot-on { color: #4c4; }
.dot-off { color: #666; }

.signal-bar { display: flex; align-items: center; gap: 0.4em;
  padding: 0.3em 0.8em; background: #252525; border-bottom: 1px solid #333;
  flex-shrink: 0; }
.signal-bar.hidden { display: none; }
.signal-badge { display: inline-block; padding: 0.1em 0.4em; border-radius: 3px;
  font-size: 0.75em; font-weight: bold; font-family: monospace; }
.signal-on { background: #4c4; color: #fff; }
.signal-off { background: #444; color: #666; }
.signal-click { cursor: pointer; }
.signal-click:hover { opacity: 0.8; }

#terminal-container { flex: 1; overflow: hidden; }
#terminal-container .xterm { height: 100%; }
</style>
</head>
<body>

<div class="toolbar">
  <a href="/">&larr; Ports</a>
  <select id="endpoint-select" title="Select a serial port tunnel"></select>
  <span class="spacer"></span>
  <span class="status" id="status">
    <span class="dot dot-off">&#x25cf;</span> Disconnected
  </span>
  <button id="btn-clear">Clear</button>
  <button id="btn-connect" class="btn-connect">Connect</button>
</div>

<div class="signal-bar hidden" id="signal-bar"></div>
<div id="terminal-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script>
const $ = id => document.getElementById(id);
const token = localStorage.getItem('ser2tcp_token');

const term = new Terminal({
  cursorBlink: true,
  scrollback: 10000,
  fontSize: 14,
  theme: {
    background: '#1e1e1e',
    foreground: '#cccccc',
    cursor: '#cccccc',
    selectionBackground: '#264f78',
  },
});
const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.open($('terminal-container'));
fitAddon.fit();
window.addEventListener('resize', () => fitAddon.fit());

let ws = null;
let signals = {};

// --- Status / UI helpers ---

function updateStatus(connected) {
  const el = $('status');
  if (connected) {
    el.innerHTML = '<span class="dot dot-on">&#x25cf;</span> Connected';
    $('btn-connect').textContent = 'Disconnect';
    $('btn-connect').className = 'btn-disconnect';
    $('btn-connect').onclick = disconnect;
    $('endpoint-select').disabled = true;
  } else {
    el.innerHTML = '<span class="dot dot-off">&#x25cf;</span> Disconnected';
    $('btn-connect').textContent = 'Connect';
    $('btn-connect').className = 'btn-connect';
    $('btn-connect').onclick = connect;
    $('endpoint-select').disabled = false;
  }
}

function renderSignals() {
  const bar = $('signal-bar');
  const names = Object.keys(signals);
  if (!names.length) { bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  bar.innerHTML = '';
  names.forEach(sig => {
    const on = signals[sig];
    const clickable = sig === 'rts' || sig === 'dtr';
    const badge = document.createElement('span');
    badge.textContent = sig.toUpperCase();
    badge.className = 'signal-badge ' + (on ? 'signal-on' : 'signal-off')
      + (clickable ? ' signal-click' : '');
    if (clickable) {
      badge.title = sig.toUpperCase() + ': click to toggle';
      badge.onclick = () => {
        if (ws && ws.readyState === WebSocket.OPEN)
          ws.send(JSON.stringify({[sig]: !on}));
      };
    }
    bar.appendChild(badge);
  });
}

function writeNotice(text) {
  term.writeln('[system] ' + text);
}

// --- Endpoint loading ---

function loadEndpoints() {
  const sel = $('endpoint-select');
  sel.innerHTML = '<option value="">Loading\u2026</option>';
  sel.disabled = true;
  $('btn-connect').disabled = true;

  const opts = { headers: {}, cache: 'no-store' };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  fetch('/api/terminal-targets', opts)
    .then(r => r.ok ? r.json() : Promise.reject(new Error('load failed')))
    .then(endpoints => {
      if (!Array.isArray(endpoints)) endpoints = [];
      sel.innerHTML = '';
      if (!endpoints.length) {
        sel.innerHTML = '<option value="">No serial ports available</option>';
        return;
      }
      endpoints.forEach(e => {
        const opt = document.createElement('option');
        opt.value = e.endpoint;
        opt.textContent = e.label || e.endpoint;
        sel.appendChild(opt);
      });
      sel.disabled = false;
      $('btn-connect').disabled = false;
      // If endpoint is in query string, pre-select it
      const params = new URLSearchParams(location.search);
      const pre = params.get('endpoint');
      if (pre) sel.value = pre;
    })
    .catch(() => {
      sel.innerHTML = '<option value="">Failed to load ports</option>';
    });
}

// --- WebSocket connection ---

function connect() {
  if (ws) return;
  const endpoint = $('endpoint-select').value;
  if (!endpoint) {
    writeNotice('Select a serial port first');
    return;
  }
  const scheme = location.protocol === 'https:' ? 'wss:' : 'ws:';
  let url = scheme + '//' + location.host + '/ws/' + endpoint;
  if (token) url += '?token=' + encodeURIComponent(token);
  writeNotice('Connecting to ' + endpoint + '...');
  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';
  ws.onopen = () => {
    signals = {};
    renderSignals();
    updateStatus(true);
    writeNotice('Connected to ' + endpoint);
    term.focus();
  };
  ws.onerror = () => {
    writeNotice('WebSocket error while connecting to ' + endpoint);
  };
  ws.onclose = ev => {
    ws = null;
    signals = {};
    renderSignals();
    updateStatus(false);
    const reason = ev && ev.reason ? ' - ' + ev.reason : '';
    const code = ev && ev.code ? ' (code ' + ev.code + ')' : '';
    writeNotice('Disconnected from ' + endpoint + code + reason);
  };
  ws.onmessage = ev => {
    if (typeof ev.data === 'string') {
      try {
        const msg = JSON.parse(ev.data);
        if (msg.signals) { signals = msg.signals; renderSignals(); }
      } catch {}
      return;
    }
    term.write(new Uint8Array(ev.data));
  };
}

function disconnect() {
  if (ws) { ws.close(); ws = null; }
  signals = {};
  renderSignals();
  updateStatus(false);
}

term.onData(data => {
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(new TextEncoder().encode(data));
});

$('btn-clear').onclick = () => term.clear();
$('btn-connect').onclick = connect;

window.addEventListener('pagehide', () => {
  if (ws) { try { ws.close(); } catch {} ws = null; }
});

loadEndpoints();
</script>
</body>
</html>
