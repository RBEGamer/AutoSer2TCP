name: Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show Docker info
        run: docker info

      - name: Build Docker image
        run: docker build --tag autoserial2tcp:ci .
